backend:
  name: git-gateway
  repo: platstarinum-prog/reseil-dalbayoba
  branch: main

media_folder: "project/public/images/uploads"
public_folder: "/images/uploads"
format: "json"

collections:
  - name: "products"
    label: "🛒 Каталог"
    folder: "project/src/data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "name", widget: "string" }
      - { label: "Бренд", name: "brand", widget: "string" }
      - { label: "Цена", name: "price", widget: "number" }
      - { label: "Категория", name: "category", widget: "string" }
      - { label: "Размеры (через запятую)", name: "sizes", widget: "string" }
      - { label: "Фото", name: "imageUrl", widget: "image" }
      - { label: "Telegram", name: "seller_tg", widget: "string" }
      - { label: "Состояние", name: "condition", widget: "string" }
      - { label: "Продано", name: "sold", widget: "boolean" }

  - name: "faq"
    label: "❓ FAQ"
    folder: "project/src/data/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Вопрос", name: "question", widget: "string" }
      - { label: "Ответ", name: "answer", widget: "text" }
